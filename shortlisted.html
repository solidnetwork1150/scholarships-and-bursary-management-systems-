<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GSU Scholarship Portal | Shortlisted Applicants</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #001432 0%, #0a1a3a 100%); min-height: 100vh; padding: 32px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 48px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: white; margin-bottom: 8px; }
        .subtitle { color: rgba(255,255,255,0.7); }
        .stats-summary { display: flex; justify-content: center; gap: 32px; margin: 24px 0; flex-wrap: wrap; }
        .stat-badge { background: rgba(212,175,55,0.2); padding: 8px 20px; border-radius: 40px; color: #FFE0A3; font-weight: 600; }
        
        .filter-section { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 32px; }
        .filter-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
        .filter-btn { background: rgba(255,255,255,0.1); border: none; padding: 8px 20px; border-radius: 30px; color: white; cursor: pointer; transition: 0.2s; }
        .filter-btn.active { background: #D4AF37; color: #001432; font-weight: 600; }
        .filter-btn:hover { background: rgba(212,175,55,0.6); }
        .search-box { background: rgba(255,255,255,0.1); border-radius: 40px; padding: 8px 16px; display: flex; align-items: center; gap: 8px; }
        .search-box input { background: none; border: none; color: white; padding: 8px; outline: none; width: 200px; }
        .search-box input::placeholder { color: rgba(255,255,255,0.6); }
        .search-box i { color: #D4AF37; }
        
        .shortlist-table { background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); border-radius: 24px; overflow: hidden; border: 1px solid rgba(212,175,55,0.3); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 16px; color: #FFE0A3; font-weight: 600; border-bottom: 1px solid rgba(212,175,55,0.3); }
        td { padding: 14px 16px; color: rgba(255,255,255,0.85); border-bottom: 1px solid rgba(255,255,255,0.1); }
        tr:hover { background: rgba(212,175,55,0.1); }
        .scholarship-name { font-weight: 600; color: #FFE0A3; }
        .status-shortlisted { background: #10b981; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; color: white; display: inline-block; }
        .status-interview { background: #f59e0b; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; color: white; display: inline-block; }
        .status-final { background: #8b5cf6; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; color: white; display: inline-block; }
        .btn-view { background: rgba(212,175,55,0.2); border: none; padding: 6px 16px; border-radius: 20px; color: #FFE0A3; cursor: pointer; transition: 0.2s; }
        .btn-view:hover { background: #D4AF37; color: #001432; }
        
        .pagination { display: flex; justify-content: center; gap: 12px; margin-top: 32px; }
        .page-btn { background: rgba(255,255,255,0.1); border: none; padding: 8px 16px; border-radius: 8px; color: white; cursor: pointer; }
        .page-btn.active { background: #D4AF37; color: #001432; }
        
        .back-link { display: inline-block; margin-top: 32px; color: #D4AF37; text-decoration: none; text-align: center; width: 100%; }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: linear-gradient(135deg, #0a1a3a, #1a2a55);
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            padding: 32px;
            border: 1px solid rgba(212,175,55,0.5);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: modalSlideIn 0.3s ease;
        }
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(212,175,55,0.3);
            padding-bottom: 16px;
        }
        .modal-header h2 {
            color: #FFE0A3;
            font-size: 1.5rem;
        }
        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .modal-close:hover {
            color: #FF6B6B;
        }
        .detail-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .detail-label {
            width: 40%;
            font-weight: 600;
            color: #FFE0A3;
        }
        .detail-value {
            width: 60%;
            color: white;
        }
        .modal-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .modal-btn {
            background: linear-gradient(135deg, #D4AF37, #F5B81B);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .modal-btn:hover {
            transform: scale(1.02);
        }

        @media (max-width: 768px) { 
            body { padding: 16px; } 
            th, td { padding: 10px; font-size: 12px; } 
            .filter-section { flex-direction: column; }
            .detail-row { flex-direction: column; }
            .detail-label { width: 100%; margin-bottom: 4px; }
            .detail-value { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎉 Shortlisted Candidates</h1>
        <div class="subtitle">Congratulations to all applicants who have advanced to the next stage</div>
        <div class="stats-summary">
            <div class="stat-badge"><i class="fas fa-users"></i> Total Shortlisted: 27</div>
            <div class="stat-badge"><i class="fas fa-calendar-alt"></i> Updated: November 2025</div>
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All Scholarships</button>
            <button class="filter-btn" data-filter="Merit Excellence">Merit Excellence</button>
            <button class="filter-btn" data-filter="STEM Leaders">STEM Leaders</button>
            <button class="filter-btn" data-filter="Women in STEM">Women in STEM</button>
            <button class="filter-btn" data-filter="Community Service">Community Service</button>
            <button class="filter-btn" data-filter="Research Grant">Research Grant</button>
        </div>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search by name or ID...">
        </div>
    </div>

    <div class="shortlist-table">
        <table id="shortlistTable">
            <thead>
                <tr><th>#</th><th>Student Name</th><th>Student ID</th><th>Scholarship</th><th>Department</th><th>GPA</th><th>Status</th><th>Action</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="pagination" id="pagination"></div>
    <div style="text-align: center;">
        <a href="dashbord.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>
</div>

<!-- Modal for Applicant Details -->
<div id="applicantModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-user-graduate"></i> Applicant Details</h2>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div id="modalBody">
            <!-- Dynamic content will be inserted here -->
        </div>
        <button class="modal-btn" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
    // 27 Shortlisted Applicants Data
    const applicants = [
        { id: 1, name: "Maryam Abubakar", studentId: "UG24/SCCS/1011", scholarship: "Merit Excellence Scholarship", dept: "Computer Science", gpa: 3.85, status: "Interview", email: "maryam.a@gsu.edu.ng", phone: "+234 801 234 5678", address: "GSU Hostel, Block A", essay: "Outstanding academic performance with multiple awards in hackathons." },
        { id: 2, name: "Ibrahim Musa", studentId: "UG24/MHND/1056", scholarship: "STEM Leaders Bursary", dept: "human nutrition and ieties", gpa: 3.72, status: "Final Review", email: "ibrahim.m@gsu.edu.ng", phone: "+234 802 345 6789", address: "Tudun Wada, Gombe", essay: "Led engineering team to national robotics competition finals." },
        { id: 3, name: "Fatima Sani", studentId: "UG19/SCCS/2024/1189", scholarship: "Women in STEM Scholarship", dept: "Computer Science", gpa: 3.91, status: "Interview", email: "fatima.s@gsu.edu.ng", phone: "+234 803 456 7890", address: "GSU Hostel, Block C", essay: "Developed a mobile app for campus navigation." },
        { id: 4, name: "Usman Bello", studentId: "UG23/MHD/2024/1012", scholarship: "Research Innovation Grant", dept: "Medicine", gpa: 3.88, status: "Shortlisted", email: "usman.b@gsu.edu.ng", phone: "+234 804 567 8901", address: "Federal Low Cost, Gombe", essay: "Research on malaria prevention published in university journal." },
        { id: 5, name: "Amina Yahaya", studentId: "GSU/LAW/2024/034", scholarship: "Community Service Award", dept: "Law", gpa: 3.65, status: "Interview", email: "amina.y@gsu.edu.ng", phone: "+234 805 678 9012", address: "Baba Sidi Quarters", essay: "Pro bono legal aid volunteer for 200+ community members." },
        { id: 6, name: "Sadiq Mohammed", studentId: "GSU/ENG/2024/078", scholarship: "Merit Excellence Scholarship", dept: "educatio and Computer Science", gpa: 3.82, status: "Shortlisted", email: "sadiq.m@gsu.edu.ng", phone: "+234 806 789 0123", address: "GRA, Gombe", essay: "Top 5% in department for three consecutive semesters." },
        { id: 7, name: "Zainab Abdullahi", studentId: "GSU/CS/2024/112", scholarship: "STEM Leaders Bursary", dept: "Computer Science", gpa: 3.79, status: "Final Review", email: "zainab.a@gsu.edu.ng", phone: "+234 807 890 1234", address: "GSU Hostel, Block B", essay: "Google Africa Scholarship recipient." },
        { id: 8, name: "Haruna Adamu", studentId: "GSU/BUS/2024/023", scholarship: "Women in STEM Scholarship", dept: "Business Admin", gpa: 3.70, status: "Shortlisted", email: "haruna.a@gsu.edu.ng", phone: "+234 808 901 2345", address: "Nawairuddeen, Gombe", essay: "Founded entrepreneurship club with 150+ members." },
        { id: 9, name: "Rukayya Umar", studentId: "GSU/SCI/2024/056", scholarship: "Research Innovation Grant", dept: "Sciences", gpa: 3.84, status: "Interview", email: "rukayya.u@gsu.edu.ng", phone: "+234 809 012 3456", address: "GSU Staff Quarters", essay: "Chemistry research on water purification." },
        { id: 10, name: "Abdullahi Idris", studentId: "GSU/ENG/2024/091", scholarship: "Community Service Award", dept: "Engineering", gpa: 3.58, status: "Shortlisted", email: "abdullahi.i@gsu.edu.ng", phone: "+234 810 123 4567", address: "Gombe Main Town", essay: "Built solar panels for rural communities." }
    ];

    // Add remaining 17 applicants with complete details
    for (let i = 11; i <= 27; i++) {
        const names = ["Hauwa Musa", "Musa Bello", "Khadija Suleiman", "Abubakar Tukur", "Ramatu Yusuf", "Nasir Ahmed", "Aisha Mohammed", "Bashir Abdullahi", "Halima Abubakar", "Ibrahim Sani", "Fatima Bello", "Suleiman Musa", "Rahma Idris", "Yusuf Adamu", "Amina Bello", "Umar Faruk", "Hassan Suleiman"];
        const scholarships = ["Merit Excellence Scholarship", "STEM Leaders Bursary", "Women in STEM Scholarship", "Research Innovation Grant", "Community Service Award"];
        const depts = ["Computer Science", "Engineering", "Medicine", "Law", "Business Admin", "Sciences"];
        const statuses = ["Shortlisted", "Interview", "Final Review"];
        
        applicants.push({
            id: i,
            name: names[i-11],
            studentId: `GSU/${depts[(i-11) % depts.length].substring(0,3).toUpperCase()}/2024/${100 + i}`,
            scholarship: scholarships[(i-11) % scholarships.length],
            dept: depts[(i-11) % depts.length],
            gpa: (3.5 + Math.random() * 0.5).toFixed(2),
            status: statuses[(i-11) % statuses.length],
            email: `${names[i-11].toLowerCase().replace(" ", ".")}@gsu.edu.ng`,
            phone: `+234 80${Math.floor(Math.random() * 90000000) + 10000000}`,
            address: "Gombe State University Campus",
            essay: "Exceptional academic record with strong community involvement and leadership qualities."
        });
    }

    let currentFilter = "all";
    let currentSearch = "";
    let currentPage = 1;
    const rowsPerPage = 10;

    function getStatusClass(status) {
        if (status === "Interview") return "status-interview";
        if (status === "Final Review") return "status-final";
        return "status-shortlisted";
    }

    function getStatusColor(status) {
        if (status === "Interview") return "#f59e0b";
        if (status === "Final Review") return "#8b5cf6";
        return "#10b981";
    }

    function viewApplicantDetails(applicant) {
        const modal = document.getElementById('applicantModal');
        const modalBody = document.getElementById('modalBody');
        
        const statusColor = getStatusColor(applicant.status);
        
        modalBody.innerHTML = `
            <div class="detail-row">
                <div class="detail-label"><i class="fas fa-user"></i> Full Name</div>
                <div class="detail-value">${applicant.name}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label"><i class="fas fa-id-card"></i> Student ID</div>
                <div class="detail-value">${applicant.studentId}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label"><i class="fas fa-envelope"></i> Email Address</div>
                <div class="detail-value">${applicant.email}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label"><i class="fas fa-phone"></i> Phone Number</div>
                <div class="detail-value">${applicant.phone}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label"><i class="fas fa-graduation-cap"></i> Department</div>
                <div class="detail-value">${applicant.dept}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label"><i class="fas fa-chart-line"></i> Current GPA</div>
                <div class="detail-value">${applicant.gpa} / 5.00</div>
            </div>
            <div class="detail-row">
                <div class="detail-label"><i class="fas fa-trophy"></i> Scholarship Applied</div>
                <div class="detail-value">${applicant.scholarship}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label"><i class="fas fa-flag-checkered"></i> Current Status</div>
                <div class="detail-value"><span style="background:${statusColor}; padding:4px 12px; border-radius:20px; font-size:12px;">${applicant.status}</span></div>
            </div>
            <div class="detail-row">
                <div class="detail-label"><i class="fas fa-home"></i> Address</div>
                <div class="detail-value">${applicant.address}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label"><i class="fas fa-file-alt"></i> Essay Summary</div>
                <div class="detail-value">${applicant.essay}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label"><i class="fas fa-calendar-alt"></i> Next Stage</div>
                <div class="detail-value">${applicant.status === "Interview" ? "Scheduled Interview - Check email for date" : (applicant.status === "Final Review" ? "Final Committee Review - Decision within 7 days" : "Document Verification Stage")}</div>
            </div>
        `;
        
        modal.classList.add('active');
    }

    function closeModal() {
        const modal = document.getElementById('applicantModal');
        modal.classList.remove('active');
    }

    function renderTable() {
        let filtered = [...applicants];
        if (currentFilter !== "all") {
            filtered = filtered.filter(a => a.scholarship === currentFilter);
        }
        if (currentSearch) {
            filtered = filtered.filter(a => 
                a.name.toLowerCase().includes(currentSearch.toLowerCase()) || 
                a.studentId.toLowerCase().includes(currentSearch.toLowerCase())
            );
        }
        
        const totalPages = Math.ceil(filtered.length / rowsPerPage);
        const start = (currentPage - 1) * rowsPerPage;
        const paginated = filtered.slice(start, start + rowsPerPage);
        
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        paginated.forEach((app, index) => {
            const row = tbody.insertRow();
            row.insertCell(0).innerHTML = start + index + 1;
            row.insertCell(1).innerHTML = `<strong>${app.name}</strong>`;
            row.insertCell(2).innerHTML = app.studentId;
            row.insertCell(3).innerHTML = `<span class="scholarship-name">${app.scholarship}</span>`;
            row.insertCell(4).innerHTML = app.dept;
            row.insertCell(5).innerHTML = app.gpa;
            row.insertCell(6).innerHTML = `<span class="${getStatusClass(app.status)}">${app.status}</span>`;
            row.insertCell(7).innerHTML = `<button class="btn-view" onclick="viewApplicantDetails(${JSON.stringify(app).replace(/"/g, '&quot;')})">View Details</button>`;
        });
        
        const paginationDiv = document.getElementById('pagination');
        paginationDiv.innerHTML = "";
        for (let i = 1; i <= totalPages; i++) {
            const btn = document.createElement('button');
            btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
            btn.innerText = i;
            btn.onclick = () => { currentPage = i; renderTable(); };
            paginationDiv.appendChild(btn);
        }
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.getAttribute('data-filter');
            currentPage = 1;
            renderTable();
        });
    });

    // Search functionality
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', () => {
        currentSearch = searchInput.value;
        currentPage = 1;
        renderTable();
    });

    // Close modal when clicking outside
    window.onclick = function(event) {
        const modal = document.getElementById('applicantModal');
        if (event.target === modal) {
            closeModal();
        }
    }

    renderTable();
</script>
</body>
</html>
