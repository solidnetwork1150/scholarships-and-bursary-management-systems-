<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GSU Scholarship Portal | Profile Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f8; overflow-x: hidden; }
        
        .dashboard-container { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 280px;
            background: #1a1a2e;
            color: #fff;
            transition: all 0.3s ease;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
            overflow-y: auto;
        }
        .sidebar.collapsed { width: 80px; }
        .sidebar.collapsed .logo-text, .sidebar.collapsed .nav-item span { display: none; }
        
        .logo-area {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #D4AF37, #F5B81B);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon i { font-size: 20px; color: #1a1a2e; }
        .logo-text { font-weight: 700; font-size: 18px; background: linear-gradient(135deg, #FFE4A0, #F5B81B); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .nav-menu { flex: 1; padding: 20px 0; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 20px;
            margin: 4px 12px;
            border-radius: 12px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
        }
        .nav-item.active { background: linear-gradient(95deg, rgba(212,175,55,0.2), rgba(245,184,27,0.1)); color: #FFE0A3; border-left: 3px solid #D4AF37; }
        .nav-item:hover { background: rgba(255,255,255,0.08); }
        
        .collapse-btn {
            margin: 20px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            transition: all 0.3s ease;
        }
        .main-content.expanded { margin-left: 80px; }
        
        .top-header {
            background: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #D4AF37, #F5B81B);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .content { padding: 28px 32px; }
        
        .profile-header {
            background: white;
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            margin-bottom: 24px;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #D4AF37, #F5B81B);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 40px;
            color: #1a1a2e;
        }
        .profile-name { font-size: 1.5rem; font-weight: 700; color: #1f2937; }
        .profile-email { color: #6b7280; }
        
        .profile-form {
            background: white;
            border-radius: 20px;
            padding: 32px;
        }
        .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group.full-width { grid-column: span 2; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #374151; }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
        }
        .btn-save {
            background: linear-gradient(135deg, #D4AF37, #F5B81B);
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .btn-save:hover { transform: scale(1.02); }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; z-index: 200; }
            .main-content { margin-left: 0; }
            .form-row { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
            .content { padding: 20px 16px; }
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="sidebar" id="sidebar">
        <div class="logo-area"><div class="logo-icon"><i class="fas fa-graduation-cap"></i></div><span class="logo-text">GSU Scholarship</span></div>
        <div class="nav-menu">
            <div class="nav-item" onclick="location.href='dashbord.html'"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></div>
            <div class="nav-item" onclick="location.href='available.html'"><i class="fas fa-book-open"></i><span>Available Scholarships</span></div>
            <div class="nav-item" onclick="location.href='notification.html'"><i class="fas fa-bell"></i><span>Notifications</span></div>
            <div class="nav-item active" onclick="location.href='profile.html'"><i class="fas fa-user-cog"></i><span>Profile Settings</span></div>
            <div class="nav-item" onclick="location.href='shortlisted.html'"><i class="fas fa-trophy"></i><span>Shortlisted</span></div>
            <div class="nav-item" onclick="location.href='login.html'"><i class="fas fa-sign-out-alt"></i><span>Logout</span></div>
        </div>
        <div class="collapse-btn" id="collapseBtn"><i class="fas fa-chevron-left"></i><span>Collapse</span></div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="top-header">
            <div>👤 Profile Settings</div>
            <div class="user-avatar" onclick="location.href='profile.html'"><i class="fas fa-user"></i></div>
        </div>

        <div class="content">
            <div class="profile-header">
                <div class="profile-avatar"><i class="fas fa-user-graduate"></i></div>
                <div class="profile-name">Maryam Abubakar</div>
                <div class="profile-email">maryam.abubakar@gsu.edu.ng</div>
            </div>
            
            <div class="profile-form">
                <div class="form-row">
                    <div class="form-group"><label>Full Name</label><input type="text" value="Maryam Abubakar"></div>
                    <div class="form-group"><label>Email Address</label><input type="email" value="maryam.abubakar@gsu.edu.ng"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Phone Number</label><input type="tel" value="+234 801 234 5678"></div>
                    <div class="form-group"><label>Student ID</label><input type="text" value="UG24/EDCS/2024/1076"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Department</label><select><option>Computer Science</option><option>Engineering</option><option>Business Administration</option></select></div>
                    <div class="form-group"><label>Current GPA</label><input type="number" step="0.01" value="3.85"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Year of Study</label><select><option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option></select></div>
                    <div class="form-group"><label>Financial Status</label><select><option>Middle Income</option><option>Low Income</option><option>High Income</option></select></div>
                </div>
                <div class="form-group full-width"><label>Current Address</label><textarea rows="2" style="width:100%; padding:12px; border-radius:12px; border:1px solid #e5e7eb;">GSU Hostel, Block A, Gombe State University Campus</textarea></div>
                <button class="btn-save" onclick="alert('Profile updated successfully!')">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script>
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('mainContent');
    document.getElementById('collapseBtn').addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
        mainContent.classList.toggle('expanded');
    });
</script>
</body>
</html>
