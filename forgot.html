<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GSU Scholarship Portal | Forgot Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #001432 0%, #0a1a3a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); border-radius: 32px; padding: 40px; width: 100%; max-width: 450px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        h1 { font-family: 'Playfair Display', serif; color: white; margin-bottom: 16px; }
        p { color: rgba(255,255,255,0.8); margin-bottom: 24px; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: none; margin-bottom: 20px; background: rgba(255,255,255,0.9); }
        button { background: linear-gradient(135deg, #D4AF37, #F5B81B); border: none; padding: 14px; border-radius: 40px; font-weight: 600; cursor: pointer; width: 100%; }
        .back-link { display: block; margin-top: 20px; color: #D4AF37; text-decoration: none; }
        @media (max-width: 480px) { .card { padding: 24px; } }
    </style>
</head>
<body>
<div class="card">
    <h1>Forgot Password?</h1>
    <p>Enter your email address and we will send you a reset link.</p>
    <input type="email" placeholder="student@gsu.edu.ng" id="resetEmail">
    <button onclick="alert('Password reset link sent to your email address. Please check your inbox.')">Send Reset Link</button>
    <a href="#" class="back-link" onclick="history.back()">← Back to Login</a>
</div>
</body>
</html>
