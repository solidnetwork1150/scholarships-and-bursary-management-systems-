<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GSU Scholarship Portal | Student Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a1a3a 0%, #1a2a55 35%, #3a3a6a 65%, #c9a03d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .container { max-width: 1200px; margin: 0 auto; width: 100%; }
        .reg-card {
            display: flex;
            flex-wrap: wrap;
            background: rgba(15, 25, 55, 0.6);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.35);
        }
        .brand-col {
            flex: 0 0 40%;
            background: rgba(0, 15, 45, 0.5);
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid rgba(212, 175, 55, 0.3);
        }
        .brand-col h2 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(120deg, #FFFFFF, #FFE4A0, #F5B81B);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0.5rem 0 0.75rem 0;
        }
        .brand-col p { color: rgba(255,255,245,0.85); margin-bottom: 2rem; }
        .feature-badge { display: flex; flex-direction: column; gap: 1rem; }
        .badge-item { display: flex; align-items: center; gap: 0.8rem; color: rgba(255,255,245,0.95); }
        .badge-item i { width: 32px; height: 32px; background: rgba(212,175,55,0.25); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: #FFDF80; }
        .form-col { flex: 0 0 60%; padding: 2.5rem; }
        .form-title { font-size: 1.8rem; font-weight: 700; color: #FFE8B6; margin-bottom: 0.25rem; }
        .form-sub { color: rgba(255,255,230,0.7); margin-bottom: 1.8rem; }
        .input-group { margin-bottom: 1.4rem; }
        .input-group input, .input-group select {
            width: 100%;
            background: rgba(0, 15, 45, 0.7);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 1rem;
            padding: 0.85rem 1rem;
            font-size: 0.95rem;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: #FFD966; }
        .btn-primary {
            width: 100%;
            background: linear-gradient(105deg, #D4AF37, #F5B81B, #C99E2E);
            border: none;
            padding: 1rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: #0a1a3a;
            cursor: pointer;
        }
        .btn-primary:hover { transform: scale(1.01); }
        .signin-link { text-align: center; margin-top: 1.5rem; color: rgba(255,240,180,0.8); }
        .signin-link a { color: #FFD966; text-decoration: none; font-weight: 600; }
        @media (max-width: 820px) { .brand-col, .form-col { flex: 0 0 100%; } .brand-col { text-align: center; } .badge-item { justify-content: center; } }
    </style>
</head>
<body>
<div class="container">
    <div class="reg-card">
        <div class="brand-col">
            <h2>Gombe State University</h2>
            <p>Official Scholarship & Bursary Portal. Join thousands of GSU students securing their future through education funding.</p>
            <div class="feature-badge">
                <div class="badge-item"><i class="fas fa-bolt"></i> Fast Application</div>
                <div class="badge-item"><i class="fas fa-lock"></i> Secure Process</div>
                <div class="badge-item"><i class="fas fa-headset"></i> 24/7 Support</div>
            </div>
        </div>
        <div class="form-col">
            <div class="form-title">Create Account</div>
            <div class="form-sub">Register to start your scholarship journey</div>
            <form>
                <div class="input-group"><input type="text" id="fullname" placeholder="Full Name"></div>
                <div class="input-group"><input type="email" id="email" placeholder="Email Address"></div>
                <div class="input-group"><input type="tel" id="phone" placeholder="Phone Number"></div>
                <div class="input-group"><select id="department"><option value="">Select Department</option><option>Computer Science</option><option>Engineering</option><option>Business Administration</option><option>Medicine</option><option>Law</option></select></div>
                <div class="input-group"><input type="text" id="studentId" placeholder="GSU Student ID Number"></div>
                <div class="input-group"><input type="number" step="0.01" id="gpa" placeholder="Current GPA (0.00 - 5.00)" min="0" max="5"></div>
                <div class="input-group"><input type="password" id="password" placeholder="Password"></div>
                <div class="input-group"><input type="password" id="confirmPwd" placeholder="Confirm Password"></div>
                <button type="button" class="btn-primary" onclick="alert('Registration demo complete! Click Login to continue.'); window.location.href='login.html';">Create Account</button>
                <div class="signin-link">Already have an account? <a href="login.html">Login to GSU Portal</a></div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
